name: Build & Task Direction Check

on:
  push:
    branches:
      - main
      - develop
      - 'feat/**'
      - 'fix/**'
      - 'refactor/**'
  pull_request:
    branches:
      - main
      - develop

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci
        env:
          CI: true

      - name: Lint code
        run: npm run lint
        continue-on-error: true

      - name: Build project
        run: npm run build
        env:
          NODE_ENV: production

      - name: Run unit tests
        run: npm test -- --coverage --forceExit --detectOpenHandles
        env:
          CI: true

      - name: Check build artifacts
        run: |
          if [ ! -d "dist" ]; then
            echo "❌ Build failed: dist directory not found"
            exit 1
          fi
          if [ ! -f "dist/main.js" ]; then
            echo "❌ Build failed: main.js not found in dist"
            exit 1
          fi
          echo "✅ Build artifacts verified"

  task-direction-check:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check branch naming convention
        run: |
          BRANCH="${{ github.head_ref }}"
          echo "Checking branch: $BRANCH"
          
          # Valid patterns: feat/*, fix/*, refactor/*, docs/*, test/*, chore/*, hotfix/*
          if [[ ! $BRANCH =~ ^(feat|fix|refactor|docs|test|chore|hotfix|style|ci|perf)/ ]]; then
            echo "❌ Branch naming doesn't follow convention (feat|fix|refactor|docs|test|chore|hotfix|style|ci|perf)/*"
            exit 1
          fi
          echo "✅ Branch naming follows convention: $BRANCH"

      - name: Check PR title format
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "Checking PR title: $TITLE"
          
          # PR title should start with conventional commit type
          if [[ ! $TITLE =~ ^(feat|fix|refactor|docs|test|chore|hotfix|style|ci|perf)(\(.+\))?:\s ]]; then
            echo "❌ PR title doesn't follow Conventional Commits (feat/fix/refactor/etc):"
            exit 1
          fi
          echo "✅ PR title follows Conventional Commits format"

      - name: Verify feature alignment with branch
        env:
          BRANCH: ${{ github.head_ref }}
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "Branch: $BRANCH"
          echo "PR Title: $TITLE"
          
          # Extract type from branch
          BRANCH_TYPE=$(echo $BRANCH | cut -d'/' -f1)
          # Extract type from PR title
          TITLE_TYPE=$(echo $TITLE | cut -d':' -f1 | cut -d'(' -f1)
          
          echo "Branch type: $BRANCH_TYPE"
          echo "Title type: $TITLE_TYPE"
          
          # Check if types match
          if [ "$BRANCH_TYPE" != "$TITLE_TYPE" ]; then
            echo "⚠️  Warning: Branch type ($BRANCH_TYPE) doesn't match PR title type ($TITLE_TYPE)"
            echo "    This is not necessarily an error, but please verify alignment"
          else
            echo "✅ Branch and PR title types are aligned"
          fi

  security-audit:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run security audit
        run: npm audit --audit-level=moderate
        continue-on-error: true

  test-coverage:
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check KYC guard coverage
        run: npm run test:kyc-guard-scan
        continue-on-error: true

      - name: Generate test coverage report
        run: npm run test:cov
        continue-on-error: true

  summary:
    runs-on: ubuntu-latest
    needs: [build-and-test, task-direction-check, security-audit, test-coverage]
    if: always()

    steps:
      - name: Report job status
        run: |
          echo "## CI Pipeline Summary"
          echo ""
          echo "| Job | Status |"
          echo "|-----|--------|"
          echo "| Build & Test | ${{ needs.build-and-test.result }} |"
          echo "| Task Direction Check | ${{ needs.task-direction-check.result }} |"
          echo "| Security Audit | ${{ needs.security-audit.result }} |"
          echo "| Test Coverage | ${{ needs.test-coverage.result }} |"
          echo ""
          
          if [ "${{ needs.build-and-test.result }}" == "failure" ]; then
            echo "❌ Build failed - please review build logs"
            exit 1
          fi
          
          echo "✅ Pipeline completed"
